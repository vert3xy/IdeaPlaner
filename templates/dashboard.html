{% extends "base.html" %}

{% block title %}Дашборд - IdPN{% endblock %}

{% block content %}
<script>
    if (!localStorage.getItem('token')) {
        window.location.href = '/login';
    }
</script>

<div class="flex flex-col h-screen bg-slate-50 overflow-hidden">

    <header class="flex-none bg-white border-b border-slate-100 z-50">
        {% include "components/navbar.html" %}
    </header>

    <section class="flex-none bg-white border-b border-slate-100 z-40 relative">
        <div class="max-w-[1600px] mx-auto px-6 py-4">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex-1">
                    {% include "components/filters.html" %}
                </div>
                
            </div>
        </div>
    </section>

    <div id="appShell" class="flex-1 flex overflow-hidden relative">
        
        <main id="masterView" class="overflow-y-auto">
            <div class="max-w-[1400px] mx-auto p-6">
                <div id="ideasGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
            </div>
        </main>

        <aside id="sideDetailPane" class="flex flex-col border-l">
            <div class="min-w-[600px] lg:min-w-[800px] h-full flex flex-col relative">
                
                <div id="sideDetailContent" class="flex-1 overflow-y-auto p-10 scroll-smooth">
                </div>
            </div>
        </aside>

    </div>
</div>

<button id="OpenModal" class="fixed bottom-8 right-8 w-16 h-16 bg-gradient-to-tr from-rose-600 to-rose-400 text-white rounded-2xl shadow-xl flex items-center justify-center text-3xl hover:scale-105 transition-all z-50 group">
    <i class="fa-solid fa-plus"></i>
</button>

{% include "components/modals.html" %}

<script type="module" src="/static/js/dashboard.js"></script>
{% endblock %}
